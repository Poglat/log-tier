<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Tier</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <img id="logo" src="assets/icon.svg">
        <h1>Log Tier</h1>
    </header>

    <section id="imageSelection">
        <label for="fileInput">Select Images to Rank</label>
        <input id=fileInput type="file" accept="image/*" multiple>
        <label for="shuffleIn">Shuffle Images?</label>
        <input id="shuffleIn" type="checkbox" checked>
    </section>

    <section id="rankImages"> <!--hidden-->
        <div id="octagon">
            <div class="comparison">
                <img id="challenger">
            </div>
            VS
            <div class="comparison">
                <img id="incumbent">
            </div>
        </div>
        <main id="tierContainer"></main>

        <div id="settingsContainer">
            <h2>Tier Settings</h2>
            <div id="tableContainer">
                <div class="rowContainer">
                    <div class="rowName">Tier Name</div>
                    <div class="rowColor">Tier Color</div>
                    <div class="rowSize">Tier Size</div>
                </div>
            </div>
            <div>
                <button onclick="addTier()">Add Tier</button>
                <button onclick="removeTier()">Remove Last Tier</button>
                <button onclick="makeCurve()">Create Bell Curve</button>
                <button onclick="resetTiers()">Reset Tiers</button>
            </div>
        </div>

    </section>

    <script src="index.js" defer></script>
</body>

</html>
