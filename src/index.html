<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Tier</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <img id="logo" src="assets/icon.svg">
        <h1>Log Tier</h1>
    </header>

    <section id="imageSelection">
        <label for="fileInput">Select Images to Rank</label>
        <input id=fileInput type="file" accept="image/*" multiple>
    </section>

    <section id="rankImages"> <!--hidden-->
        <div id="octagon">
            <div class="comparison">
                <img id="challenger">
            </div>
            VS
            <div class="comparison">
                <img id="incumbent">
            </div>
        </div>
        <main id="tierContainer"></main>

        <div id="tableContainer">
            <h2>Tier Settings</h2>
            <div class="rowContainer">
                <div class="rowName">Tier Name</div>
                <div class="rowColor">Tier Color</div>
                <div class="rowSize">Tier Size</div>
            </div>
            <div class="rowContainer">
                <div class="rowName">Dummy</div>
                <select class="rowColor" onchange="event.target.className=`rowColor`;event.target.classList.add(event.target.value);console.log(`fuck penis`)">
                    <option value="red">Red</option>
                    <option value="orange">Orange</option>
                    <option value="yellow">Yellow</option>
                    <option value="green">Green</option>
                    <option value="aqua">Aqua</option>
                    <option value="blue">Blue</option>
                    <option value="purple">Purple</option>
                    <option value="indigo">Indigo</option>
                    <option value="gray">Gray</option>
                    <option value="white">White</option>
                </select>
                <div class="rowSize">Dummy</div>
            </div>
        </div>

    </section>

    <script src="index.js" defer></script>
</body>

</html>
